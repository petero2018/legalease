version: 2

models:
  - name: fct_firm_rankings
    description: |
      Fact table for the "Top Tier Firms" client product widget.
      Sources from int__rankings and adds derived flags for filtering and grouping.
      Grain: one row per ranking_id (1:1 with int__rankings).

    columns:
      - name: ranking_id
        description: Unique identifier for the ranking record. Grain of the table.
        data_type: varchar
        tests:
          - unique:
              config:
                severity: error
                tags: ["p1", "data_integrity"]
                meta:
                  rationale: >
                    Duplicate ranking_ids would cause double-counting in the
                    "Top Tier Firms" widget. This must always be unique.
          - not_null:
              config:
                severity: error
                tags: ["p1", "data_integrity"]
                meta:
                  rationale: >
                    A NULL ranking_id makes the row untraceable and breaks
                    the widget's linking to ranking details.

      - name: edition_year
        description: Publication edition year. Used for widget filtering by edition.
        data_type: integer
        tests:
          - not_null:
              config:
                severity: error
                tags: ["p1", "data_integrity"]
                meta:
                  rationale: >
                    edition_year is the primary filter for the widget.
                    Missing year means the firm cannot be placed in any edition.

      - name: edition_id
        description: Publication edition identifier (e.g. ED2024UK).
        data_type: varchar

      - name: firm_country
        description: Country of the ranked firm. Used for geographic filtering in the widget.
        data_type: varchar

      - name: firm_city
        description: City of the ranked firm.
        data_type: varchar

      - name: firm_ref
        description: Foreign key to the firm reference data.
        data_type: varchar

      - name: firm_name
        description: Display name of the ranked firm. Resolved from raw_firms.
        data_type: varchar

      - name: practice_area_id
        description: Foreign key to the practice area reference data.
        data_type: varchar

      - name: practice_group
        description: Practice group classification (e.g. Corporate, Energy & Infrastructure).
        data_type: varchar

      - name: practice_area_name
        description: Practice area name (e.g. Capital Markets, Infrastructure).
        data_type: varchar

      - name: sub_practice_area
        description: Sub-practice area name for granular filtering.
        data_type: varchar

      - name: ranking_tier
        description: Unified ranking tier (0-5). 0 = unranked, 1-5 = tiered.
        data_type: integer

      - name: ranking_type
        description: Type of ranking ('firm recommended', 'firm to watch').
        data_type: varchar

      - name: ranking_decision_status
        description: >
          Derived status: 'RANKED', 'NOT RANKED'. Determines if the firm
          appears in the "Top Tier Firms" widget.
        data_type: varchar

      - name: post_status
        description: Editorial workflow status (PUBLISH, DRAFT, PENDING, TRASH).
        data_type: varchar

      - name: publication_status
        description: Publication lifecycle status (RESEARCHING, ACTIVE, ARCHIVE).
        data_type: varchar

      - name: listing_type
        description: Listing category (PREMIUM, STANDARD, SPONSORED, VIP, NULL).
        data_type: varchar

      - name: is_top_tier
        description: 'TRUE if ranking_tier BETWEEN 1 AND 5. The widget only displays tiered firms.'
        data_type: boolean

      - name: is_ranked
        description: 'TRUE if ranking_decision_status = ''RANKED''. Filters out non-ranked rows from the widget.'
        data_type: boolean

      - name: is_premium_listing
        description: 'TRUE if listing_type IN (''PREMIUM'', ''VIP''). Premium listings get elevated visibility in the widget UI.'
        data_type: boolean

      - name: tier_group
        description: >
          Categorised tier group: 'TOP' (1-2), 'MID' (3-4), 'LOWER' (5),
          'UNKNOWN' (NULL or 0). Used for widget filter controls.
        data_type: varchar

      - name: modified_ts
        description: Timestamp of the last modification to the ranking record.
        data_type: timestamp

    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 800
            config:
              severity: error
              tags: ["p1", "volume_monitoring"]
              meta:
                rationale: >
                  Minimum 800 rows. raw_rankings has ~1040 rows; after
                  deduplication and invalid firm_ref filtering, stg__rankings
                  yields ~1020 rows. int__rankings preserves this grain.
                  A drop below 800 suggests catastrophic data loss (e.g. an
                  entire edition or country missing), which would make the
                  "Top Tier Firms" widget show incomplete counts and erode
                  client trust. This threshold is set to catch P1 incidents
                  while avoiding false positives from normal variance.
          - elementary.volume_anomalies:
              timestamp_column: modified_ts
              where_expression: "1=1"
              sensitivity: normal
              days_back: 7
              config:
                severity: warn
                tags: ["p2", "volume_monitoring"]
                meta:
                  rationale: >
                    The "Top Tier Firms" widget consumes fct_firm_rankings
                    directly. Any anomalous volume change (e.g. a missing
                    region feed or duplicate load) would immediately distort
                    the widget's firm counts. Elementary learns the expected
                    volume pattern from historical data and alerts on
                    statistically significant deviations.