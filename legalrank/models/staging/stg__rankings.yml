version: 2

models:
  - name: stg__rankings
    description: |
      Cleaned and deduplicated staging model for rankings data.
      Handles dual-schema ingestion (pre/post CMS migration) by
      unifying ranking_tier from two source columns. Rows with invalid
      firm_ref (NULL or empty) are excluded. post_status is standardised
      to lowercase. Deduplication keeps the latest modified_ts per ranking_id.

    columns:
      - name: ranking_id
        description: Unique identifier for the ranking record. Deduplicated by latest modified_ts.
        data_type: varchar
        tests:
          - unique:
              config:
                severity: error
                tags: ["p1", "data_integrity"]
                meta:
                  rationale: >
                    Duplicate ranking_ids would cause inflated firm counts in
                    downstream marts and the "Top Tier Firms" widget. This
                    must always be unique as the grain of the model.
          - not_null:
              config:
                severity: error
                tags: ["p1", "data_integrity"]
                meta:
                  rationale: >
                    A NULL ranking_id makes the row untraceable. The downstream
                    mart cannot display rankings without this identifier.

      - name: edition_year
        description: Publication edition year for the ranking.
        data_type: integer
        tests:
          - not_null:
              config:
                severity: error
                tags: ["p1", "data_integrity"]
                meta:
                  rationale: >
                    edition_year is used for partitioning and filtering in
                    client products. Missing year means the ranking cannot
                    be assigned to an edition.

      - name: edition_id
        description: Identifier for the publication edition (e.g. ED2024UK).
        data_type: varchar
        tests:
          - not_null:
              config:
                severity: warn
                tags: ["p2", "data_quality"]
                meta:
                  rationale: >
                    edition_id does not join to any reference table, but
                    a missing value means the ranking cannot be grouped
                    or filtered by specific edition. Warning as it is
                    useful metadata but not business-critical.

      - name: firm_ref
        description: Foreign key to the raw_firms seed. Must resolve to a valid firm.
        data_type: varchar
        tests:
          - not_null:
              config:
                severity: error
                tags: ["p1", "data_integrity"]
                meta:
                  rationale: >
                    Rankings must be linked to a firm. Without a valid firm_ref,
                    the ranking cannot be displayed in firm-specific widgets.
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: '^F[0-9]{4}$'
                config:
                  severity: warn
                  tags: ["p2", "data_quality"]
                  meta:
                    rationale: >
                      Verifies the SQL firm_ref validation logic. All valid
                      firm_ref values must match the pattern F + 4 digits.

      - name: practice_area_id
        description: Foreign key to the raw_practice_areas seed.
        data_type: varchar
        tests:
          - not_null:
              config:
                severity: warn
                tags: ["p2", "data_quality"]
                meta:
                  rationale: >
                    A missing practice_area_id means we cannot classify the
                    ranking by practice area. The row is still useful for
                    firm-level aggregation, hence warn rather than error.
          - relationships:
              arguments:
                to: ref('raw_practice_areas')
                field: practice_area_id
                config:
                  severity: warn
                  tags: ["p2", "data_quality"]
                  meta:
                    rationale: >
                      Rows referencing unknown practice areas would show as
                      unclassified in the widget. Monitor this as an indicator
                      of data freshness on the reference table.

      - name: ranking_tier
        description: >
          Unified ranking tier (0-5). Derived from `ranking_tier` (integer,
          pre-migration) or `tier_rank` (varchar, post-migration, including
          legacy 'TIER_N' values). NULL when no tier was assigned.
        data_type: integer
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 5
                strictly: false
                config:
                  severity: error
                  tags: ["p1", "data_quality"]
                  meta:
                    rationale: >
                      ranking_tier must be 0-5 inclusive. Any value outside
                      this range would break the "Top Tier Firms" widget
                      tiering logic and cause display errors.
          - not_null:
              config:
                severity: warn
                tags: ["p2", "data_quality"]
                meta:
                  rationale: >
                    NULL ranking_tier values are legitimate (e.g. rankings
                    still being evaluated), but monitoring NULL counts helps
                    detect when the tier derivation logic fails.

      - name: ranking_type
        description: Type of ranking awarded to the firm (e.g. 'firm recommended', 'firm to watch').
        data_type: varchar
        tests:
          - accepted_values:
              arguments:  
                values: ['firm recommended', 'firm to watch']
                config:
                  severity: warn
                  tags: ["p2", "data_quality"]
                  meta:
                    rationale: >
                      Unexpected ranking_type values indicate schema drift
                      on the source system. These would not break the mart
                      but would fail to render correctly on client dashboards.
          - not_null:
              config:
                severity: error
                tags: ["p1", "data_integrity"]
                meta:
                  rationale: >
                    ranking_type drives the ranking_decision_status derivation
                    logic. NULL values would silently produce incorrect
                    status in the downstream business logic.

      - name: post_status
        description: Editorial workflow status, standardised to lowercase.
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ['publish', 'draft', 'pending', 'trash']
                config:
                  severity: warn
                  tags: ["p2", "data_quality"]
                  meta:
                    rationale: >
                      Unknown post_status values would cause downstream
                      ranking_decision_status logic (Task 3) to behave
                      unexpectedly, potentially hiding valid rankings.
          - not_null:
              config:
                severity: error
                tags: ["p1", "data_integrity"]
                meta:
                  rationale: >
                    post_status determines if a ranking is visible to
                    client products. NULL values make the ranking
                    undisplayable.

      - name: publication_status
        description: Publication lifecycle status of the ranking (e.g. Researching, Active, Archive).
        data_type: varchar
        tests:
          - not_null:
              config:
                severity: warn
                tags: ["p2", "data_quality"]
                meta:
                  rationale: >
                    publication_status is metadata; missing values do not
                    block downstream processing but reduce visibility into
                    the ranking lifecycle.
          - accepted_values:
              arguments:
                values: ['researching', 'active', 'archive']
                config:
                  severity: warn
                  tags: ["p2", "data_quality"]
                  meta:
                    rationale: >
                      Unexpected publication_status values indicate schema
                      drift. Non-blocking but worth monitoring for data
                      quality assessment.

      - name: listing_type
        description: Listing category (e.g. premium, standard, sponsored, vip, exclusive, featured).
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ['premium', 'standard', 'sponsored', 'vip', 'exclusive', 'featured']
                config:
                  severity: warn
                  tags: ["p2", "data_quality"]
                  meta:
                    rationale: >
                      Unexpected listing_type values could affect premium
                      listing flag logic in downstream marts. Non-blocking
                      warning for data quality monitoring.

      - name: commentary
        description: Optional editorial commentary text for the ranking.
        data_type: varchar

      - name: modified_ts
        description: Timestamp of the last modification to the ranking record. Used for deduplication.
        data_type: timestamp
        tests:
          - not_null:
              config:
                severity: error
                tags: ["p1", "data_integrity"]
                meta:
                  rationale: >
                    modified_ts is the deduplication cursor. A NULL value
                    means we cannot determine which row is the latest,
                    risking stale data in the "Top Tier Firms" widget.