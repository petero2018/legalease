version: 2

sources:
  - name: raw
    description: >
      Raw source data loaded via dbt seed. Fivetran syncs at 20:00 UTC and 02:00 UTC.
      Marts must be ready by 07:00 UTC. Freshness thresholds reflect this SLA:
      warn at 6 hours (02:00 sync + margin), error at 12 hours (missed sync window).

    tables:
      - name: raw_rankings
        description: Raw rankings data from CMS export
        config:
          loaded_at_field: modified_ts
          freshness:
            warn_after:
              count: 6
              period: hour
            error_after:
              count: 12
              period: hour

      - name: raw_submissions
        description: Raw submissions data
        config:
          loaded_at_field: created_ts
          freshness:
            warn_after:
              count: 6
              period: hour
            error_after:
              count: 12
              period: hour