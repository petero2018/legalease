version: 2

seeds:
  - name: raw_submissions
    description: Raw submissions data loaded from CSV.
    config:
      column_types:
        submission_id: varchar
        firm_ref: varchar
        practice_area_id: varchar
        edition_year: integer
        submission_type: varchar
        submitted_by_email: varchar
        submitted_at: timestamp
        num_referees: integer
        status: varchar
        created_ts: timestamp

    columns:
      - name: submission_id
        description: Identifier for the submission record.

      - name: firm_ref
        description: Firm identifier linked to the raw firms seed.

      - name: practice_area_id
        description: Practice area identifier linked to the raw practice areas seed.

      - name: edition_year
        description: Publication edition year for the submission.

      - name: submission_type
        description: Type of submission provided.

      - name: submitted_by_email
        description: Email address of the submitter.

      - name: submitted_at
        description: Timestamp when the submission was submitted.

      - name: num_referees
        description: Number of referees included in the submission.

      - name: status
        description: Current status of the submission.

      - name: created_ts
        description: Timestamp when the submission record was created.